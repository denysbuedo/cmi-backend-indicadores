name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          insecure_ignore_host_key: true
          script: |
            echo "🚀 Deploying backend..."
            cd /var/www/cmi/cmi-backend-indicadores
            git pull origin main
            npm install --production
            npm run build
            
            # Reiniciar servicio
            if systemctl is-active --quiet cmi-backend; then
              systemctl restart cmi-backend
            else
              pkill -f "node dist/src/main.js" || true
              cd /var/www/cmi/cmi-backend-indicadores
              nohup node dist/src/main.js > /var/www/cmi/backend.log 2>&1 &
            fi
            
            echo "✅ Backend deployed!"
